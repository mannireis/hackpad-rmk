[keyboard]
name = "shoop"
product_name = "shoop"
vendor_id    = 0x4C4B
product_id   = 0x4643
manufacturer = "me!!!"
chip         = "rp2040"

[matrix]
row_pins = ["PIN_6", "PIN_7"]
col_pins = ["PIN_26", "PIN_27", "PIN_28", "PIN_29"]

[layout]
rows   = 2
cols   = 4
layers = 2

# Define the keymap layers. Each layer is 2 rows of 4 columns.
# (Use actual RMK keycodes or macros here; "_" below means no-op)
keymap = [
  [
    ["A", "B", "C", "D"],
    ["KC1", "KC2", "KC3", "KC4"],
  ],
  [
    ["__", "__", "__", "__"],
    ["__", "__", "__", "__"],
  ]
]

[[input_device.encoder]]
pin_a = "PIN_0"
pin_b = "PIN_1"
phase = "default"
